services:
  - type: web
    name: vnclinic-voice-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_LIVE_MODEL
        value: gemini-3.1-flash-live-preview
      - key: CORS_ORIGINS
        value: https://hai1975.com,https://www.hai1975.com,http://localhost:8080
